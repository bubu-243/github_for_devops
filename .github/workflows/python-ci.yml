name: Python CI/CD Pipeline

on:
  push:
    branches:
      - master   # ✅ FIXED (change to main if needed)

jobs:
  scan-and-copy:
    runs-on: self-hosted

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Verify Gitleaks installation (debug step)
      - name: Check Gitleaks installation
        run: |
          echo "Checking Gitleaks..."
          which gitleaks
          gitleaks version

      # Step 3: Run Gitleaks using CLI
      - name: Run Gitleaks scan (CLI)
        run: |
          echo "Running Gitleaks scan..."
          gitleaks detect --source . --verbose --exit-on-find

      # Step 4: Copy Excel file
      - name: Copy Excel file
        run: |
          echo "Copying Excel file..."
          mkdir -p "$HOME/Documents"
          cp "$HOME/Downloads/BHIM Test cases.xlsx" "$HOME/Documents/"

      # Step 5: Verify copied file
      - name: Verify file copied
        run: |
          echo "Checking destination folder:"
          ls "$HOME/Documents/"
