name: Python CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  scan-and-copy:
    runs-on: self-hosted  # This ensures the workflow runs on your self-hosted runner

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run Gitleaks scan
      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose --exit-on-find
        # Note: Ensure gitleaks is installed on your self-hosted runner

      # Step 3: Copy Excel file from Downloads to Documents
      - name: Copy Excel file
        run: |
          echo "Copying Excel file..."
          mkdir -p "$HOME/Documents"
          cp "$HOME/Downloads/BHIM Test cases.xlsx" "$HOME/Documents/"

      # Step 4: Verify copied file
      - name: Verify file copied
        run: |
          echo "Checking destination folder:"
          ls "$HOME/Documents/"
