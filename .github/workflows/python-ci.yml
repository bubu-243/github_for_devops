name: Python CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  scan-and-copy:
    runs-on: self-hosted

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Verify Gitleaks installation
      - name: Check Gitleaks installation
        run: |
          echo "Checking Gitleaks..."
          which gitleaks
          gitleaks version

      # Step 3: Run Gitleaks scan
      - name: Run Gitleaks scan (CLI)
        run: |
          echo "Running Gitleaks scan..."
          gitleaks detect 

      # Step 4: Update ClamAV database
      - name: Update ClamAV database
        run: |
          echo "Updating ClamAV database..."
          sudo freshclam

      # Step 5: Run ClamAV scan
      - name: Run ClamAV scan
        run: |
          echo "Running ClamAV scan..."
          clamscan -r . --infected --exit-code=1

      # Step 6: Copy Excel file
      - name: Copy Excel file
        run: |
          echo "Copying Excel file..."
          mkdir -p "$HOME/Documents"
          cp "$HOME/Downloads/BHIM Test cases.xlsx" "$HOME/Documents/"

      # Step 7: Verify copied file
      - name: Verify file copied
        run: |
          echo "Checking destination folder:"
          ls "$HOME/Documents/"
