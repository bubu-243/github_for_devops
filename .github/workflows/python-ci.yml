name: Python CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  copy:
    runs-on: self-hosted 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
      - name: Copy Excel file from Downloads to Documents
        run: |
          echo "Copying file..."
          cp "/home/satyaprakash.patra@apmosys.mahape/Downloads/BHIM Test cases .xlsx" \
             "/home/satyaprakash.patra@apmosys.mahape/Documents/"

      - name: Verify file copied
        run: |
          echo "Checking destination folder:"
          ls "/home/satyaprakash.patra@apmosys.mahape/Documents/"


          
